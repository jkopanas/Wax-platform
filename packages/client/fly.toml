# fly.toml app configuration file generated for wax-platform-client on 2026-06-15T19:23:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wax-platform-client'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile-production'

[env]
  CLIENT_PANDOC_URL = 'https://wax-pandoc.fly.dev'
  SERVER_URL = 'https://wax-server.fly.dev'
  WEBSOCKET_SERVER_URL = 'wss://wax-server.fly.dev:3333'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
